<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Connectez-vous ou créez votre compte ReactionCam pour partager des vidéos et capturer les réactions.">
<meta name="robots" content="noindex">
<title>ReactionCam — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #111; --border: #1e1e1e;
  --gold: #c9a84c; --gold-dim: #7a6330;
  --text: #e8e0d0; --muted: #5a5245; --green: #4a7c59; --red: #c0392b;
}
html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.4;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}

.page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; position: relative; z-index: 1; }

header { position: fixed; top: 0; left: 0; right: 0; padding: 24px 40px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; letter-spacing: 0.12em; color: var(--gold); text-decoration: none; }
.logo span { font-style: italic; }

.card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }

.tabs { display: flex; border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 16px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; background: none; border: none; color: var(--muted); cursor: pointer; transition: color 0.2s, background 0.2s; }
.tab.active { color: var(--gold); background: #0d0d0d; border-bottom: 1px solid var(--gold); margin-bottom: -1px; }

.form-body { padding: 36px 32px; }

.field { margin-bottom: 20px; }
.field label { display: block; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.field input {
  width: 100%; background: #0d0d0d; border: 1px solid var(--border); border-radius: 2px;
  padding: 12px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
  outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--gold-dim); }

.btn-submit {
  width: 100%; padding: 14px; background: var(--gold); color: #0a0a0a;
  border: none; border-radius: 2px; font-family: 'DM Mono', monospace;
  font-size: 11px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 8px;
}
.btn-submit:hover { background: #e0bb60; }
.btn-submit:active { transform: scale(0.99); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

.error { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); border-radius: 2px; padding: 10px 14px; font-size: 12px; color: #e07060; margin-bottom: 16px; display: none; letter-spacing: 0.04em; }

.panel { display: none; }
.panel.active { display: block; }

.divider { text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; margin: 24px 0 0; }

.btn-google {
  width: 100%; padding: 12px 14px; margin-bottom: 20px;
  background: #fff; color: #3c4043; border: 1px solid #dadce0; border-radius: 2px;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.06em;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 10px; transition: background 0.15s; text-decoration: none;
}
.btn-google:hover { background: #f1f3f4; }

.or-sep { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.or-sep::before, .or-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.or-sep span { font-size: 10px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap; }

.global-error { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); border-radius: 2px; padding: 10px 14px; font-size: 12px; color: #e07060; margin: 0 32px 0; letter-spacing: 0.04em; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.card { animation: fadeUp 0.5s ease both; }
</style>
</head>
<body>
<header>
  <a class="logo" href="/">Reaction<span>Cam</span></a>
  <div id="rc-controls-mount"></div>
</header>

<div class="page">
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" data-i18n="login.tab.login">Connexion</button>
      <button class="tab" id="tabRegister" data-i18n="login.tab.register">Créer un compte</button>
    </div>

    <div id="globalError" style="display:none;padding:12px 32px 0;"></div>

    <!-- LOGIN -->
    <div class="panel active" id="panelLogin">
      <div class="form-body">
        <a href="/auth/google" class="btn-google" id="btnGoogleLogin">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          <span data-i18n="login.google">Continuer avec Google</span>
        </a>
        <div class="or-sep"><span data-i18n="login.or.email">ou continuer avec email</span></div>
        <div class="error" id="loginError"></div>
        <div class="field">
          <label data-i18n="login.label.email">Email</label>
          <input type="email" id="loginEmail" placeholder="toi@exemple.com" autocomplete="email" data-i18n-placeholder="login.email.placeholder">
        </div>
        <div class="field">
          <label data-i18n="login.label.password">Mot de passe</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-submit" id="btnLogin" data-i18n="login.btn.login">Se connecter</button>
        <p class="divider"><span data-i18n="login.link.no-account">Pas encore de compte ?</span> <a href="#" id="goRegister" style="color:var(--gold);text-decoration:none;" data-i18n="login.link.register">Créer un compte</a></p>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="panel" id="panelRegister">
      <div class="form-body">
        <a href="/auth/google" class="btn-google" id="btnGoogleRegister">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          <span data-i18n="login.google">Continuer avec Google</span>
        </a>
        <div class="or-sep"><span data-i18n="login.or.create">ou créer avec email</span></div>
        <div class="error" id="registerError"></div>
        <div class="field">
          <label data-i18n="login.label.name">Ton prénom / pseudo</label>
          <input type="text" id="registerName" placeholder="Alex" autocomplete="name">
        </div>
        <div class="field">
          <label data-i18n="login.label.email">Email</label>
          <input type="email" id="registerEmail" placeholder="toi@exemple.com" autocomplete="email" data-i18n-placeholder="login.email.placeholder">
        </div>
        <div class="field">
          <label data-i18n="login.label.password">Mot de passe</label>
          <input type="password" id="registerPassword" placeholder="6 caractères minimum" autocomplete="new-password" data-i18n-placeholder="login.pw.placeholder">
        </div>
        <button class="btn-submit" id="btnRegister" data-i18n="login.btn.register">Créer mon compte</button>
        <p class="divider"><span data-i18n="login.link.has-account">Déjà un compte ?</span> <a href="#" id="goLogin" style="color:var(--gold);text-decoration:none;" data-i18n="login.link.login">Se connecter</a></p>
      </div>
    </div>

    <!-- VÉRIFICATION EMAIL -->
    <div class="panel" id="panelVerify">
      <div class="form-body" style="text-align:center;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:20px;"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        <p style="font-size:15px;letter-spacing:0.06em;margin-bottom:10px;" data-i18n="login.verify.title">Vérifie ta boîte mail</p>
        <p style="font-size:12px;color:var(--muted);margin-bottom:6px;" data-i18n="login.verify.desc">Un lien de confirmation a été envoyé à</p>
        <p style="font-size:13px;color:var(--gold);margin-bottom:28px;" id="verifyEmailAddr"></p>
        <div class="error" id="resendError" style="text-align:left;"></div>
        <div id="resendSuccess" style="background:rgba(74,124,89,0.1);border:1px solid rgba(74,124,89,0.3);border-radius:2px;padding:10px 14px;font-size:12px;color:#4a7c59;margin-bottom:16px;display:none;letter-spacing:0.04em;" data-i18n="login.verify.resent">Email renvoyé !</div>
        <button class="btn-submit" id="btnResend" data-i18n="login.verify.resend">Renvoyer l'email</button>
        <p class="divider" style="margin-top:20px;"><a href="#" id="goBackLogin" style="color:var(--gold);text-decoration:none;" data-i18n="login.verify.back">← Retour à la connexion</a></p>
      </div>
    </div>
  </div>
</div>

<script src="/ui.js"></script>
<script>
// Redirect if already logged in
fetch('/api/auth/me').then(r => { if (r.ok) location.href = '/dashboard'; });

// Affiche les erreurs OAuth passées en paramètre URL
const urlError = new URLSearchParams(location.search).get('error');
if (urlError === 'google') {
  const el = document.getElementById('globalError');
  el.style.display = 'block';
  el.innerHTML = '<div class="global-error">La connexion Google a échoué. Réessaie ou utilise ton email.</div>';
} else if (urlError === 'google_not_configured') {
  const el = document.getElementById('globalError');
  el.style.display = 'block';
  el.innerHTML = '<div class="global-error">La connexion Google n\'est pas encore activée.</div>';
} else if (urlError === 'verify_expired') {
  const el = document.getElementById('globalError');
  el.style.display = 'block';
  el.innerHTML = '<div class="global-error">Ce lien de vérification a expiré ou est invalide. Reconnecte-toi pour en recevoir un nouveau.</div>';
} else if (urlError === 'verify_invalid') {
  const el = document.getElementById('globalError');
  el.style.display = 'block';
  el.innerHTML = '<div class="global-error">Lien de vérification invalide.</div>';
}

const tabLogin    = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const panelLogin  = document.getElementById('panelLogin');
const panelReg    = document.getElementById('panelRegister');
const panelVerify = document.getElementById('panelVerify');

function showLogin() {
  tabLogin.classList.add('active'); tabRegister.classList.remove('active');
  panelLogin.classList.add('active'); panelReg.classList.remove('active'); panelVerify.classList.remove('active');
}
function showRegister() {
  tabRegister.classList.add('active'); tabLogin.classList.remove('active');
  panelReg.classList.add('active'); panelLogin.classList.remove('active'); panelVerify.classList.remove('active');
}
function showVerify(email) {
  tabLogin.classList.remove('active'); tabRegister.classList.remove('active');
  panelLogin.classList.remove('active'); panelReg.classList.remove('active'); panelVerify.classList.add('active');
  document.getElementById('verifyEmailAddr').textContent = email || '';
  document.getElementById('resendError').style.display = 'none';
  document.getElementById('resendSuccess').style.display = 'none';
  panelVerify._email = email;
}

tabLogin.addEventListener('click', showLogin);
tabRegister.addEventListener('click', showRegister);
document.getElementById('goRegister').addEventListener('click', e => { e.preventDefault(); showRegister(); });
document.getElementById('goLogin').addEventListener('click', e => { e.preventDefault(); showLogin(); });
document.getElementById('goBackLogin').addEventListener('click', e => { e.preventDefault(); showLogin(); });

if (location.pathname === '/register') showRegister();

async function apiPost(url, body) {
  const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  return [r.ok, await r.json()];
}

function setError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

// LOGIN
document.getElementById('btnLogin').addEventListener('click', async () => {
  setError('loginError', '');
  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = window.__('login.btn.logging-in');
  const [ok, data] = await apiPost('/api/auth/login', {
    email: document.getElementById('loginEmail').value,
    password: document.getElementById('loginPassword').value
  });
  if (ok) {
    location.href = '/dashboard';
  } else if (data.needsVerification) {
    showVerify(data.email);
  } else {
    setError('loginError', data.error);
    btn.disabled = false; btn.textContent = window.__('login.btn.login');
  }
});

// REGISTER
document.getElementById('btnRegister').addEventListener('click', async () => {
  setError('registerError', '');
  const btn = document.getElementById('btnRegister');
  btn.disabled = true; btn.textContent = window.__('login.btn.creating');
  const [ok, data] = await apiPost('/api/auth/register', {
    name: document.getElementById('registerName').value,
    email: document.getElementById('registerEmail').value,
    password: document.getElementById('registerPassword').value
  });
  if (ok && data.needsVerification) {
    showVerify(data.email);
  } else if (ok) {
    location.href = '/dashboard';
  } else {
    setError('registerError', data.error);
    btn.disabled = false; btn.textContent = window.__('login.btn.register');
  }
});

// RESEND VERIFICATION
document.getElementById('btnResend').addEventListener('click', async () => {
  const btn = document.getElementById('btnResend');
  btn.disabled = true;
  document.getElementById('resendError').style.display = 'none';
  document.getElementById('resendSuccess').style.display = 'none';
  const [ok, data] = await apiPost('/api/auth/resend-verification', { email: panelVerify._email });
  if (ok) {
    document.getElementById('resendSuccess').style.display = 'block';
  } else {
    setError('resendError', data.error);
  }
  setTimeout(() => { btn.disabled = false; }, 30000);
});

// Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (panelLogin.classList.contains('active')) document.getElementById('btnLogin').click();
  else document.getElementById('btnRegister').click();
});
</script>
</body>
</html>
