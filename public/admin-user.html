<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/logo.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilisateur — Admin ReactionCam</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #161616;
    --border: #1e1e1e; --border2: #2a2a2a;
    --gold: #c9a84c; --gold-dim: #7a6330;
    --text: #e8e0d0; --muted: #a09080; --muted2: #5a5245;
    --red: #c0392b; --green: #27ae60; --radius: 3px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; min-height: 100vh; }

  /* Header */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo { display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }
  .header-logo img[src="/logo.svg"], .header-logo img[src="/logo-dark.svg"] { height: 34px; width: auto; display: block; margin-right: 10px; }
  .header-logo img[src="/titre.svg"], .header-logo img[src="/titre-light.svg"] { height: 40px; width: auto; display: block; }
  .header-badge { background: var(--gold); color: #0a0a0a; font-size: 9px; letter-spacing: .15em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; }
  .back-btn { color: var(--muted); text-decoration: none; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .back-btn:hover { color: var(--text); }
  .header-spacer { flex: 1; }

  /* Layout */
  .main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

  /* Breadcrumb */
  .breadcrumb { font-size: 11px; color: var(--muted2); margin-bottom: 24px; }
  .breadcrumb a { color: var(--muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--text); }
  .breadcrumb span { margin: 0 6px; }

  /* User card */
  .user-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 32px; margin-bottom: 24px;
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start;
  }
  .user-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--gold); font-weight: 300; flex-shrink: 0;
    margin-bottom: 16px;
  }
  .user-name-big { font-size: 22px; font-weight: 300; letter-spacing: .06em; margin-bottom: 4px; }
  .user-email { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .user-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 8px; }
  .meta-item { font-size: 11px; }
  .meta-label { color: var(--muted2); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px; }
  .meta-value { color: var(--text); }

  /* Plan editor */
  .plan-editor { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
  .plan-editor-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted2); }
  .plan-select {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
    padding: 8px 12px; border-radius: var(--radius); font-family: inherit; font-size: 12px; cursor: pointer; width: 130px;
  }
  .plan-select:focus { outline: none; border-color: var(--gold-dim); }

  /* Pills */
  .pill { display: inline-block; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; }
  .pill-free  { background: #1a1a1a; color: var(--muted); border: 1px solid var(--border2); }
  .pill-pro   { background: #1a2a1a; color: var(--green); border: 1px solid #1a3a1a; }
  .pill-admin { background: #2a200a; color: var(--gold);  border: 1px solid #3a2a0a; }
  .pill-ok    { background: #0a1a0a; color: var(--green); border: 1px solid #1a3a1a; }
  .pill-warn  { background: #1a1200; color: #c9a84c;      border: 1px solid #3a2a0a; }

  /* Stats row */
  .stats-row { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-mini {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 20px; flex: 1; min-width: 120px;
  }
  .stat-mini-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted2); margin-bottom: 6px; }
  .stat-mini-val { font-size: 22px; color: var(--gold); }

  /* Section title */
  .section-title { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted2); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .truncate { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dim { color: var(--muted); }
  .small { font-size: 11px; }
  .video-link { color: var(--gold); text-decoration: none; font-size: 11px; }
  .video-link:hover { text-decoration: underline; }

  /* Buttons */
  .btn { background: none; border: 1px solid var(--border2); color: var(--muted); padding: 5px 12px; border-radius: var(--radius); cursor: pointer; font-family: inherit; font-size: 11px; letter-spacing: .04em; transition: all .15s; }
  .btn:hover { color: var(--text); border-color: var(--muted2); }
  .btn-danger { color: var(--red); border-color: #4a1a1a; }
  .btn-danger:hover { background: #1a0808; border-color: var(--red); color: #e74c3c; }
  .btn-primary { background: var(--gold); color: #0a0a0a; border: none; padding: 8px 18px; font-family: inherit; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; border-radius: var(--radius); cursor: pointer; }
  .btn-primary:hover { background: #dbb85c; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  /* Danger zone */
  .danger-zone { background: var(--surface); border: 1px solid #3a1a1a; border-radius: var(--radius); padding: 20px 24px; }
  .danger-zone h3 { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--red); margin-bottom: 10px; }
  .danger-zone p { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); padding: 10px 18px; border-radius: var(--radius); font-size: 12px; color: var(--text); opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 9999; }
  #toast.show { opacity: 1; }
  #toast.ok  { border-color: var(--green); color: var(--green); }
  #toast.err { border-color: var(--red);   color: #e74c3c; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 28px 32px; max-width: 400px; width: 90%; }
  .modal h3 { font-size: 14px; margin-bottom: 10px; }
  .modal p  { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* Empty */
  .empty { padding: 32px; text-align: center; color: var(--muted2); font-size: 12px; }
</style>
<script src="/logo-theme.js" defer></script>
</head>
<body>

<header class="header">
  <a class="header-logo" href="/admin"><img src="/logo.svg" alt="" height="28"><img src="/titre.svg" alt="ReactionCam"></a>
  <span class="header-badge">Admin</span>
  <span class="header-spacer"></span>
  <a class="back-btn" href="/admin">← Retour à la liste</a>
</header>

<div class="main" id="main">
  <div style="padding:60px;text-align:center;color:var(--muted2)">Chargement…</div>
</div>

<div id="toast"></div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3 id="modalTitle">Confirmer</h3>
    <p id="modalBody"></p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-danger" id="modalConfirm">Confirmer</button>
    </div>
  </div>
</div>

<script>
const userId = location.pathname.split('/').pop();
let userData = null;

// ── Init ───────────────────────────────────────────────────────────────────────
(async () => {
  const me = await api('/api/auth/me').catch(() => null);
  if (!me || me.plan !== 'admin') { window.location = '/dashboard'; return; }
  await loadUser();
})();

// ── API ────────────────────────────────────────────────────────────────────────
async function api(url, opts = {}) {
  const res = await fetch(url, { credentials: 'include', ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

// ── Load & render ──────────────────────────────────────────────────────────────
async function loadUser() {
  try {
    const d = await api(`/api/admin/users/${userId}`);
    userData = d;
    render(d);
  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div style="padding:60px;text-align:center;color:var(--red)">Erreur : ${esc(e.message)}</div>`;
  }
}

function render({ user, videos, totalSize }) {
  const initial = (user.name || '?')[0].toUpperCase();
  const totalReactions = videos.reduce((s, v) => s + v.reactionCount, 0);

  document.getElementById('main').innerHTML = `
    <div class="breadcrumb">
      <a href="/admin">Administration</a>
      <span>›</span>
      <a href="/admin">Utilisateurs</a>
      <span>›</span>
      ${esc(user.email)}
    </div>

    <!-- User card -->
    <div class="user-card">
      <div>
        <div class="user-avatar">${initial}</div>
        <div class="user-name-big">${esc(user.name)}</div>
        <div class="user-email">${esc(user.email)}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
          <span class="pill pill-${user.plan}">${user.plan}</span>
          <span class="pill ${user.emailVerified ? 'pill-ok' : 'pill-warn'}">${user.emailVerified ? 'Email vérifié' : 'Non vérifié'}</span>
          ${user.googleId ? '<span class="pill pill-ok">Google OAuth</span>' : ''}
          ${user.stripeSubscriptionId ? '<span class="pill pill-ok">Stripe actif</span>' : ''}
        </div>
        <div class="user-meta">
          <div class="meta-item">
            <div class="meta-label">Inscription</div>
            <div class="meta-value">${fmtDate(user.createdAt)}</div>
          </div>
          ${user.stripeCustomerId ? `
          <div class="meta-item">
            <div class="meta-label">Stripe ID</div>
            <div class="meta-value dim small">${esc(user.stripeCustomerId)}</div>
          </div>` : ''}
          <div class="meta-item">
            <div class="meta-label">MongoDB ID</div>
            <div class="meta-value dim small">${esc(user._id)}</div>
          </div>
        </div>
      </div>
      <div class="plan-editor">
        <div class="plan-editor-label">Plan</div>
        <select class="plan-select" id="planSelect" onchange="changePlan(this.value)">
          <option value="free"  ${user.plan==='free'?'selected':''}>Free</option>
          <option value="pro"   ${user.plan==='pro'?'selected':''}>Pro</option>
          <option value="admin" ${user.plan==='admin'?'selected':''}>Admin</option>
        </select>
        <div style="font-size:10px;color:var(--muted2);text-align:right;line-height:1.5;">
          Pro = vidéos permanentes<br>Free = expiration 90j
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-mini">
        <div class="stat-mini-label">Vidéos</div>
        <div class="stat-mini-val">${videos.length}</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">Réactions reçues</div>
        <div class="stat-mini-val">${totalReactions}</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">Stockage</div>
        <div class="stat-mini-val">${fmtBytes(totalSize)}</div>
      </div>
    </div>

    <!-- Videos table -->
    <div class="section-title">Vidéos uploadées</div>
    <div class="table-wrap">
      ${videos.length === 0 ? '<div class="empty">Aucune vidéo</div>' : `
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Nom fichier</th>
              <th>Taille</th>
              <th>Réactions</th>
              <th>Expiration</th>
              <th>Upload</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${videos.map(v => `
              <tr>
                <td class="truncate small">
                  <a class="video-link" href="/watch/${v._id}" target="_blank">${esc(v.originalName || v._id)}</a>
                </td>
                <td class="dim small">${fmtBytes(v.size || 0)}</td>
                <td class="dim small">${v.reactionCount}</td>
                <td class="small ${v.expiresAt ? 'dim' : ''}">${v.expiresAt ? fmtDate(v.expiresAt) : '∞ Permanent'}</td>
                <td class="dim small">${fmtDate(v.createdAt)}</td>
                <td>
                  <button class="btn btn-danger" onclick="confirmDeleteVideo('${v._id}','${esc(v.originalName || v._id)}')">Supprimer</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`}
    </div>

    <!-- Danger zone -->
    <div class="section-title">Zone de danger</div>
    <div class="danger-zone">
      <h3>Supprimer ce compte</h3>
      <p>
        Supprime définitivement le compte de <strong style="color:var(--text)">${esc(user.name)}</strong> (${esc(user.email)}),
        toutes ses vidéos et toutes les réactions associées. Cette action supprime aussi les fichiers sur Cloudinary.
        <br><strong style="color:var(--red)">Irréversible.</strong>
      </p>
      <button class="btn btn-danger" onclick="confirmDeleteUser()">Supprimer le compte</button>
    </div>
  `;
}

// ── Change plan ────────────────────────────────────────────────────────────────
async function changePlan(plan) {
  try {
    await api(`/api/admin/users/${userId}/plan`, { method: 'PATCH', body: JSON.stringify({ plan }) });
    toast('Plan mis à jour', 'ok');
    loadUser();
  } catch (e) {
    toast('Erreur : ' + e.message, 'err');
    loadUser();
  }
}

// ── Delete video ───────────────────────────────────────────────────────────────
function confirmDeleteVideo(videoId, name) {
  document.getElementById('modalTitle').textContent = 'Supprimer la vidéo';
  document.getElementById('modalBody').innerHTML =
    `Supprimer <strong style="color:var(--text)">${esc(name)}</strong> et toutes ses réactions ?<br>
     <span style="color:var(--red)">Les fichiers Cloudinary seront aussi supprimés.</span>`;
  document.getElementById('modalConfirm').onclick = async () => {
    closeModal();
    try {
      await api(`/api/admin/videos/${videoId}`, { method: 'DELETE' });
      toast('Vidéo supprimée', 'ok');
      loadUser();
    } catch (e) {
      toast('Erreur : ' + e.message, 'err');
    }
  };
  document.getElementById('confirmModal').classList.add('open');
}

// ── Delete user ────────────────────────────────────────────────────────────────
function confirmDeleteUser() {
  document.getElementById('modalTitle').textContent = 'Supprimer le compte';
  document.getElementById('modalBody').innerHTML =
    `Supprimer définitivement ce compte et <strong style="color:var(--text)">${userData?.videos?.length || 0} vidéo(s)</strong> ?<br>
     <span style="color:var(--red)">Cette action est irréversible.</span>`;
  document.getElementById('modalConfirm').onclick = async () => {
    closeModal();
    try {
      await api(`/api/admin/users/${userId}`, { method: 'DELETE' });
      toast('Compte supprimé', 'ok');
      setTimeout(() => window.location = '/admin', 1200);
    } catch (e) {
      toast('Erreur : ' + e.message, 'err');
    }
  };
  document.getElementById('confirmModal').classList.add('open');
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function closeModal() { document.getElementById('confirmModal').classList.remove('open'); }

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function fmtBytes(b) {
  if (!b) return '0 o';
  if (b < 1024) return b + ' o';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' Ko';
  if (b < 1024 ** 3)   return (b / 1024 / 1024).toFixed(1) + ' Mo';
  return (b / 1024 ** 3).toFixed(2) + ' Go';
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
</body>
</html>
