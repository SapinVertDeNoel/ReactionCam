<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('rc-theme')||'dark')</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Gérez vos vidéos et consultez les réactions reçues sur ReactionCam.">
<meta name="robots" content="noindex">
<title>ReactionCam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #111; --surface2: #141414; --border: #1e1e1e;
  --gold: #c9a84c; --gold-dim: #7a6330;
  --text: #e8e0d0; --muted: #5a5245; --green: #4a7c59; --red: #c0392b;
}
html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.35;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}

.app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

nav {
  display: flex; align-items: center; justify-content: space-between;
  height: 60px; padding: 0 48px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: rgba(10,10,10,0.95);
  backdrop-filter: blur(8px); z-index: 100;
}
.logo { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
.logo span { font-style: italic; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.user-name { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-decoration: none; cursor: pointer; }
.user-name:hover { color: var(--text); }
.btn-logout { background: none; border: 1px solid var(--border); border-radius: 2px; padding: 8px 16px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
.btn-logout:hover { color: var(--text); border-color: var(--muted); }
.btn-admin { background: none; border: 1px solid var(--gold-dim); border-radius: 2px; padding: 3px 8px; color: var(--gold); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; }
.btn-admin:hover { background: rgba(201,168,76,0.08); }
.plan-badge { display: inline-block; padding: 3px 8px; border-radius: 2px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
.plan-badge.free { border: 1px solid var(--border); color: var(--muted); }
.plan-badge.pro  { border: 1px solid var(--gold-dim); color: var(--gold); background: rgba(201,168,76,0.06); }
.plan-badge.admin { border: 1px solid var(--gold-dim); color: var(--gold); background: rgba(201,168,76,0.06); }

main { flex: 1; padding: 48px; max-width: 1200px; width: 100%; margin: 0 auto; }

.plan-bar { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); margin-bottom: 24px; flex-wrap: wrap; }
.plan-bar-info { flex: 1; font-size: 12px; color: var(--muted); }
.plan-bar-info strong { color: var(--text); }
.plan-bar-quota { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
.plan-bar-quota .used { color: var(--gold); }
.btn-upgrade { display: inline-flex; align-items: center; gap: 6px; background: var(--gold); color: #0a0a0a; border: none; border-radius: 2px; padding: 8px 16px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; text-decoration: none; white-space: nowrap; }
.btn-upgrade:hover { background: #e0bb60; }
.btn-manage { display: inline-flex; align-items: center; gap: 6px; background: none; color: var(--muted); border: 1px solid var(--border); border-radius: 2px; padding: 8px 16px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.btn-manage:hover { color: var(--text); border-color: var(--muted); }
.video-expiry { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; margin-top: 4px; }
.video-expiry.soon { color: #e67e22; }

.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 12px 24px; border-radius: 3px; font-size: 12px; letter-spacing: 0.08em; z-index: 300; animation: toastIn 0.3s ease; pointer-events: none; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.topbar { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 16px; }
.page-title { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; line-height: 1; }
.page-title em { font-style: italic; color: var(--gold); }
.btn-upload { display: inline-flex; align-items: center; gap: 8px; background: var(--gold); color: #0a0a0a; border: none; border-radius: 2px; padding: 12px 22px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; text-decoration: none; }
.btn-upload:hover { background: #e0bb60; }

.empty { text-align: center; padding: 80px 40px; border: 1px dashed var(--border); border-radius: 4px; }
.empty-icon { width: 48px; height: 48px; margin: 0 auto 20px; opacity: 0.2; }
.empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; margin-bottom: 8px; }
.empty p { font-size: 12px; color: var(--muted); }

.videos-grid { display: flex; flex-direction: column; gap: 24px; }

.video-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.video-header { display: flex; align-items: center; gap: 20px; padding: 20px 24px; cursor: pointer; transition: background 0.2s; }
.video-header:hover { background: var(--surface2); }
.video-thumb { width: 120px; height: 68px; background: #000; border-radius: 2px; overflow: hidden; flex-shrink: 0; position: relative; border: 1px solid var(--border); }
.video-thumb video { width: 100%; height: 100%; object-fit: cover; }
.video-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0.2; }
.video-meta { flex: 1; min-width: 0; }
.video-name { font-size: 13px; color: var(--text); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.video-date { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 10px; }
.video-stats { display: flex; gap: 16px; }
.stat { font-size: 11px; letter-spacing: 0.08em; }
.stat-val { color: var(--gold); }
.stat-lbl { color: var(--muted); margin-left: 4px; }
.video-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.btn-copy { background: none; border: 1px solid var(--border); border-radius: 2px; padding: 8px 14px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.btn-copy:hover { color: var(--gold); border-color: var(--gold-dim); }
.btn-copy.copied { color: var(--green); border-color: var(--green); }
.chevron { transition: transform 0.3s; opacity: 0.4; flex-shrink: 0; }
.video-card.open .chevron { transform: rotate(180deg); }

.reactions-section { border-top: 1px solid var(--border); }
.reactions-header { padding: 14px 24px; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); background: #0d0d0d; }
.reactions-list { padding: 0; }
.reaction-row { display: flex; align-items: center; gap: 16px; padding: 14px 24px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
.reaction-row:last-child { border-bottom: none; }
.reaction-row:hover { background: var(--surface2); }
.reaction-thumb { width: 90px; height: 52px; background: #000; border-radius: 2px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); cursor: pointer; position: relative; }
.reaction-thumb video { width: 100%; height: 100%; object-fit: contain; }
.play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); transition: background 0.2s; }
.reaction-thumb:hover .play-overlay { background: rgba(0,0,0,0.1); }
.reaction-meta { flex: 1; min-width: 0; }
.reaction-viewer { font-size: 12px; color: var(--text); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.reaction-date { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
.reaction-status { font-size: 10px; margin-top: 3px; letter-spacing: 0.08em; }
.status-ready { color: var(--green); }
.status-processing { color: var(--gold); }
.reaction-dl { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); border-radius: 2px; padding: 7px 12px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; text-decoration: none; flex-shrink: 0; }
.reaction-dl:hover { color: var(--text); border-color: var(--muted); }
.btn-delete { display: flex; align-items: center; gap: 5px; background: none; border: 1px solid transparent; border-radius: 2px; padding: 6px 10px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.btn-delete:hover { color: #c0392b; border-color: rgba(192,57,43,0.3); }

/* Onglets */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab {
  background: none; border: none; padding: 12px 20px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted);
  border-bottom: 2px solid transparent; transform: translateY(1px);
  transition: color 0.2s, border-color 0.2s;
  display: inline-flex; align-items: center; gap: 8px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 6px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 9px;
  font-size: 9px; color: var(--muted); letter-spacing: 0;
}
.tab.active .tab-count { background: rgba(201,168,76,0.12); border-color: var(--gold-dim); color: var(--gold); }

/* Mes réactions */
.my-rx-list { display: flex; flex-direction: column; gap: 12px; }
.my-rx-card {
  display: grid; grid-template-columns: 120px 1fr auto; gap: 18px; align-items: center;
  padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  transition: border-color 0.2s;
}
.my-rx-card:hover { border-color: var(--gold-dim); }
.my-rx-thumb { width: 120px; height: 68px; background: #000; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; cursor: pointer; position: relative; }
.my-rx-thumb video { width: 100%; height: 100%; object-fit: contain; }
.my-rx-meta { min-width: 0; }
.my-rx-orig { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.my-rx-orig em { font-style: italic; color: var(--gold); }
.my-rx-author { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 4px; }
.my-rx-date { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
.my-rx-actions { display: flex; gap: 8px; flex-shrink: 0; }
.my-rx-card.unavailable { opacity: 0.55; }
.my-rx-card.unavailable .my-rx-thumb { background: #1a1a1a; display: flex; align-items: center; justify-content: center; cursor: default; color: var(--muted); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
@media (max-width: 600px) {
  .my-rx-card { grid-template-columns: 80px 1fr; gap: 12px; padding: 12px; }
  .my-rx-thumb { width: 80px; height: 46px; }
  .my-rx-actions { grid-column: 1 / -1; justify-content: flex-end; }
}

.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 80px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal-content { max-width: 800px; width: 100%; position: relative; display: flex; justify-content: center; }
.modal-video { max-width: 100%; max-height: 80vh; border-radius: 3px; background: #000; object-fit: contain; }
.modal-close { position: absolute; top: -40px; right: 0; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; }
.modal-close:hover { color: var(--text); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.app { animation: fadeIn 0.4s ease; }

@media (max-width: 600px) {
  nav { height: 62px; padding: 0 18px; }
  .user-name, .plan-badge, .btn-logout { display: none !important; }
}
@media (max-width: 640px) {
  main { padding: 24px 16px; }
  .page-title { font-size: 32px; }
  .topbar { flex-direction: column; align-items: flex-start; gap: 12px; }
  .btn-upload { width: 100%; justify-content: center; }
  .video-header { padding: 14px 16px; gap: 12px; }
  .video-thumb { width: 80px; height: 46px; }
  .video-name { font-size: 12px; }
  .video-stats { gap: 10px; }
  .video-actions { gap: 6px; }
  .btn-copy { padding: 6px 10px; }
  .reaction-row { padding: 12px 16px; gap: 10px; }
  .reaction-thumb { width: 70px; height: 40px; }
  .reaction-dl span { display: none; }
  .plan-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
  .btn-upgrade, .btn-manage { width: 100%; justify-content: center; }
}
</style>
<link rel="stylesheet" href="/theme.css">
<script src="/logo-theme.js" defer></script>
</head>
<body>
<div class="app">
  <nav>
    <a class="logo" href="/" aria-label="ReactionCam"><svg class="logo-mark" viewBox="0 0 32 32" width="22" height="22" aria-hidden="true" focusable="false"><circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="16" cy="16" r="5" fill="currentColor"/></svg><span class="logo-text">Reaction<em>Cam</em></span></a>
    <div class="nav-right">
      <div id="rc-controls-mount"></div>
      <a class="user-name" href="/account" id="userName">…</a>
      <span class="plan-badge free" id="planBadge">…</span>
      <button class="btn-logout" id="btnLogout" data-i18n="nav.logout">Déconnexion</button>
    </div>
  </nav>

  <main>
    <div class="topbar">
      <div>
        <div class="page-title"><span data-i18n="dashboard.title">Mes</span> <em data-i18n="dashboard.title.em">vidéos</em></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a href="/stats" class="btn-manage" style="text-decoration:none;">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 11h10M3 9V6M6 9V3M9 9V7"/>
          </svg>
          Statistiques
        </a>
        <a href="/" class="btn-upload">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 1v7M2 5l4-4 4 4"/><path d="M1 10h10"/>
          </svg>
          <span data-i18n="nav.upload">Uploader une vidéo</span>
        </a>
      </div>
    </div>

    <div id="planInfo" style="display:none;" class="plan-bar"></div>

    <div class="tabs" role="tablist">
      <button class="tab active" id="tabVideos" role="tab">
        Mes vidéos <span class="tab-count" id="cntVideos">0</span>
      </button>
      <button class="tab" id="tabReactions" role="tab">
        Mes réactions <span class="tab-count" id="cntReactions">0</span>
      </button>
    </div>

    <div id="content"><div class="spinner"></div></div>
    <div id="contentRx" style="display:none;"><div class="spinner"></div></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose" data-i18n="dashboard.modal.close">✕ fermer</button>
    <video class="modal-video" id="modalVideo" controls playsinline></video>
  </div>
</div>

<script src="/ui.js"></script>
<script src="/rc-notif.js" defer></script>
<script>
const DATE_LOCALES = { fr: 'fr-FR', en: 'en-US', es: 'es-ES' };

let me = null;
let _dashData = null;

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

async function init() {
  const r = await fetch('/api/auth/me');
  if (!r.ok) { location.href = '/login'; return; }
  me = await r.json();
  document.getElementById('userName').textContent = me.name;
  // Mobile menu
  window.RC.clearMobileLinks();
  window.RC.addMobileLink(window.RC.makeMobileLink(me.name, '/account', true));
  const mLogout = window.RC.makeMobileBtn(window.__('nav.logout'), false);
  mLogout.addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    location.href = '/login';
  });
  window.RC.addMobileLink(mLogout);

  const badge = document.getElementById('planBadge');
  badge.textContent = me.planLabel;
  badge.className   = `plan-badge ${me.plan}`;

  if (me.plan === 'admin') {
    const badge = document.getElementById('planBadge');
    const adminLink = document.createElement('a');
    adminLink.href = '/admin';
    adminLink.className = 'btn-admin';
    adminLink.textContent = 'Admin';
    badge.replaceWith(adminLink);
  }

  if (new URLSearchParams(location.search).get('upgrade') === 'success') {
    showToast(window.__('dashboard.toast.pro'));
    history.replaceState(null, '', '/dashboard');
  }

  loadDashboard();
}

document.getElementById('btnLogout').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method: 'POST' });
  location.href = '/login';
});

async function loadDashboard() {
  const r    = await fetch('/api/dashboard');
  _dashData  = await r.json();
  renderPlanBar(_dashData);
  renderDashboard(_dashData.videos);
  document.getElementById('cntVideos').textContent = _dashData.videos.length;
  initTabs();
  loadMyReactions();
}

// ── Onglets vidéos / réactions ──────────────────────────────────────────────
let _myReactions = null;

function initTabs() {
  const tabV = document.getElementById('tabVideos');
  const tabR = document.getElementById('tabReactions');
  const paneV = document.getElementById('content');
  const paneR = document.getElementById('contentRx');

  function activate(which) {
    const isV = which === 'videos';
    tabV.classList.toggle('active', isV);
    tabR.classList.toggle('active', !isV);
    paneV.style.display = isV ? '' : 'none';
    paneR.style.display = isV ? 'none' : '';
  }
  tabV.addEventListener('click', () => activate('videos'));
  tabR.addEventListener('click', () => activate('reactions'));
}

async function loadMyReactions() {
  try {
    const r = await fetch('/api/my-reactions');
    if (!r.ok) throw new Error();
    const data = await r.json();
    _myReactions = data.reactions;
    document.getElementById('cntReactions').textContent = _myReactions.length;
    renderMyReactions(_myReactions);
  } catch {
    document.getElementById('contentRx').innerHTML = '<div class="empty"><p>Impossible de charger tes réactions.</p></div>';
  }
}

function renderMyReactions(list) {
  const el = document.getElementById('contentRx');
  if (!list.length) {
    el.innerHTML = `
      <div class="empty">
        <svg class="empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="24" cy="24" r="20"/>
          <path d="M16 20h.01M32 20h.01M16 30c2 2 5 3 8 3s6-1 8-3"/>
        </svg>
        <h3>Pas encore de réaction</h3>
        <p>Tes réactions enregistrées sur les vidéos d'autres utilisateurs apparaîtront ici (tant que tu es connecté quand tu réagis).</p>
      </div>`;
    return;
  }

  el.innerHTML = `<div class="my-rx-list">${list.map(rx => {
    if (!rx.video.available) {
      return `
        <div class="my-rx-card unavailable" data-id="${rx.id}">
          <div class="my-rx-thumb">supprimée</div>
          <div class="my-rx-meta">
            <div class="my-rx-orig"><em>vidéo originale supprimée</em></div>
            <div class="my-rx-author">en tant que ${escHtml(rx.viewerName)}</div>
            <div class="my-rx-date">${formatDate(rx.createdAt)}</div>
          </div>
          <div class="my-rx-actions">
            <a class="reaction-dl" href="${rx.url}" download="reaction.webm">
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M6 1v8M3.5 6.5L6 9l2.5-2.5"/><path d="M1 11h10"/>
              </svg>
              <span>Télécharger</span>
            </a>
            <button class="btn-delete" data-rx-del="${rx.id}">
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 3h8M5 3V2h2v1M3.5 3l.5 7h4l.5-7M5 5v4M7 5v4"/></svg>
            </button>
          </div>
        </div>`;
    }
    return `
      <div class="my-rx-card" data-id="${rx.id}">
        <div class="my-rx-thumb" data-rx-play="${rx.url}">
          <video src="${rx.url}" muted preload="metadata"></video>
        </div>
        <div class="my-rx-meta">
          <div class="my-rx-orig">Réaction sur <em>${escHtml(rx.video.originalName) || 'vidéo sans nom'}</em></div>
          <div class="my-rx-author">de ${escHtml(rx.video.ownerName)} · en tant que ${escHtml(rx.viewerName)}</div>
          <div class="my-rx-date">${formatDate(rx.createdAt)}</div>
        </div>
        <div class="my-rx-actions">
          <a class="reaction-dl" href="${rx.url}" download="reaction.webm">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M6 1v8M3.5 6.5L6 9l2.5-2.5"/><path d="M1 11h10"/>
            </svg>
            <span>Télécharger</span>
          </a>
          <button class="btn-delete" data-rx-del="${rx.id}">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 3h8M5 3V2h2v1M3.5 3l.5 7h4l.5-7M5 5v4M7 5v4"/></svg>
          </button>
        </div>
      </div>`;
  }).join('')}</div>`;

  el.querySelectorAll('[data-rx-play]').forEach(t => {
    t.addEventListener('click', () => openModal(t.dataset.rxPlay));
  });
  el.querySelectorAll('[data-rx-del]').forEach(b => {
    b.addEventListener('click', () => deleteMyReaction(b.dataset.rxDel));
  });
}

async function deleteMyReaction(id) {
  if (!confirm('Supprimer cette réaction ?')) return;
  const r = await fetch(`/api/my-reactions/${id}`, { method: 'DELETE' });
  if (!r.ok) { alert('Erreur lors de la suppression'); return; }
  _myReactions = _myReactions.filter(x => x.id !== id);
  document.getElementById('cntReactions').textContent = _myReactions.length;
  renderMyReactions(_myReactions);
}

function renderPlanBar({ plan, planLabel, maxVideos, videoCount }) {
  const el = document.getElementById('planInfo');
  el.style.display = 'flex';

  if (plan === 'pro' || plan === 'admin') {
    el.innerHTML = `
      <div class="plan-bar-info">Plan <strong>${planLabel}</strong> — ${window.__('dashboard.plan.unlimited')}</div>
      <button class="btn-manage" id="btnPortal">${window.__('dashboard.plan.manage')}</button>`;
    document.getElementById('btnPortal').addEventListener('click', openPortal);
  } else {
    el.innerHTML = `
      <div class="plan-bar-info">
        Plan <strong>${planLabel}</strong>
        <span class="plan-bar-quota"> · <span class="used">${videoCount}</span> / ${maxVideos} vidéos${window.__('dashboard.plan.quota')}</span>
      </div>
      <a href="/pricing" class="btn-upgrade">${window.__('dashboard.plan.upgrade')}</a>`;
  }
}

async function openPortal() {
  const btn = document.getElementById('btnPortal');
  btn.textContent = window.__('dashboard.portal.loading');
  const r = await fetch('/api/billing/portal', { method: 'POST' });
  const { url, error } = await r.json();
  if (error) { btn.textContent = window.__('dashboard.plan.manage'); alert(error); return; }
  location.href = url;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function formatDate(ts) {
  const locale = DATE_LOCALES[window.RC_LANG] || 'fr-FR';
  return new Date(ts).toLocaleDateString(locale, { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function rxHeader(count) {
  if (count === 0) return window.__('dashboard.rx.none');
  const plural = count > 1;
  return `${count} ${window.__(plural ? 'dashboard.rx.plural' : 'dashboard.rx.singular')} ${window.__(plural ? 'dashboard.rx.received.plural' : 'dashboard.rx.received.singular')}`;
}

function renderDashboard(videos) {
  const el = document.getElementById('content');
  if (!videos.length) {
    el.innerHTML = `
      <div class="empty">
        <svg class="empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="4" y="8" width="40" height="32" rx="3"/>
          <polygon points="18,16 34,24 18,32"/>
        </svg>
        <h3>${window.__('dashboard.empty.title')}</h3>
        <p style="margin-top:8px;">${window.__('dashboard.empty.desc')}</p>
      </div>`;
    return;
  }

  el.innerHTML = `<div class="videos-grid">${videos.map(renderVideoCard).join('')}</div>`;

  videos.forEach(v => {
    document.getElementById(`header-${v.id}`).addEventListener('click', () => {
      document.getElementById(`card-${v.id}`).classList.toggle('open');
    });
    document.getElementById(`del-${v.id}`).addEventListener('click', async e => {
      e.stopPropagation();
      if (!confirm(window.__('dashboard.delete.confirm'))) return;
      const btn = document.getElementById(`del-${v.id}`);
      btn.disabled = true;
      const r = await fetch(`/api/video/${v.id}`, { method: 'DELETE' });
      if (r.ok) {
        document.getElementById(`card-${v.id}`).remove();
        _dashData.videos = _dashData.videos.filter(x => x.id !== v.id);
        renderPlanBar(_dashData);
        if (!_dashData.videos.length) renderDashboard([]);
      } else {
        btn.disabled = false;
      }
    });
    document.getElementById(`copy-${v.id}`).addEventListener('click', e => {
      e.stopPropagation();
      const link = `${location.origin}/watch/${v.id}`;
      navigator.clipboard.writeText(link).then(() => {
        const btn = document.getElementById(`copy-${v.id}`);
        btn.textContent = window.__('dashboard.copy.done');
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = window.__('dashboard.copy.link');
          btn.classList.remove('copied');
        }, 2000);
      });
    });
    v.reactions.forEach(rx => {
      const thumb = document.getElementById(`rxthumb-${rx.id}`);
      if (thumb) thumb.addEventListener('click', () => openModal(rx.url));
      const dl = document.getElementById(`rxdl-${rx.id}`);
      if (dl) dl.addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = rx.url;
        a.download = `reaction_${rx.id}.mp4`;
        a.click();
      });
    });
  });
}

function renderVisBadge(v) {
  if (v.visibility !== 'private') return '';
  return ` <span style="display:inline-block;margin-left:6px;padding:2px 6px;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-dim);border-radius:2px;vertical-align:middle;">Privée</span>`;
}

function renderVideoCard(v) {
  const shareLink = `${location.origin}/watch/${v.id}`;
  const count = v.reactions.length;
  return `
  <div class="video-card" id="card-${v.id}" data-id="${v.id}">
    <div class="video-header" id="header-${v.id}">
      <div class="video-thumb">
        <video src="${v.url}" muted preload="metadata" crossorigin="anonymous"></video>
      </div>
      <div class="video-meta">
        <div class="video-name">${escHtml(v.originalName) || window.__('dashboard.no-name')}${renderVisBadge(v)}</div>
        <div class="video-date">${formatDate(v.createdAt)}</div>
        <div class="video-stats">
          <span class="stat"><span class="stat-val">${count}</span><span class="stat-lbl">${window.__(count !== 1 ? 'dashboard.rx.plural' : 'dashboard.rx.singular')}</span></span>
        </div>
        ${v.visibility === 'private' && v.allowedEmails?.length ? `<div class="video-expiry" style="color:var(--gold);">🔒 Privée · ${v.allowedEmails.length} invité${v.allowedEmails.length > 1 ? 's' : ''}</div>` : ''}
        ${renderExpiry(v.expiresAt)}
      </div>
      <div class="video-actions">
        <button class="btn-copy" id="copy-${v.id}">${window.__('dashboard.copy.link')}</button>
        <button class="btn-delete" id="del-${v.id}" title="${window.__('dashboard.delete')}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
        <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </div>
    </div>

    <div class="reactions-section">
      <div class="reactions-header">${rxHeader(count)}</div>
      ${count === 0 ? `
        <div style="padding:20px 24px;font-size:12px;color:var(--muted);">
          ${window.__('dashboard.rx.share')}
          <span style="color:var(--gold);font-size:11px;">${shareLink}</span>
        </div>
      ` : `
        <div class="reactions-list">
          ${v.reactions.map(rx => renderReactionRow(rx)).join('')}
        </div>
      `}
    </div>
  </div>`;
}

function renderExpiry(expiresAt) {
  if (!expiresAt) return '';
  const d    = new Date(expiresAt);
  const days = Math.ceil((d - Date.now()) / 86400000);
  const soon = days <= 14;
  const locale = DATE_LOCALES[window.RC_LANG] || 'fr-FR';
  const txt = soon
    ? `${window.__('dashboard.expire.in')} ${days} ${window.__(days > 1 ? 'dashboard.expire.days' : 'dashboard.expire.day')}`
    : `${window.__('dashboard.expire.on')} ${d.toLocaleDateString(locale, { day: '2-digit', month: 'short', year: 'numeric' })}`;
  return `<div class="video-expiry${soon ? ' soon' : ''}">${txt}</div>`;
}

function renderReactionRow(rx) {
  const url = rx.url;
  return `
  <div class="reaction-row">
    <div class="reaction-thumb" id="rxthumb-${rx.id}">
      ${url ? `
        <video src="${url}" muted preload="metadata"></video>
        <div class="play-overlay">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <polygon points="7,4 17,10 7,16" fill="rgba(255,255,255,0.8)"/>
          </svg>
        </div>
      ` : `
        <div class="play-overlay" style="background:rgba(0,0,0,0.5);">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4">
            <circle cx="8" cy="8" r="6"/><path d="M5 8h6M8 5v6"/>
          </svg>
        </div>
      `}
    </div>
    <div class="reaction-meta">
      <div class="reaction-viewer">${escHtml(rx.viewerName) || window.__('dashboard.anonymous')}</div>
      <div class="reaction-date">${formatDate(rx.createdAt)}</div>
      <div class="reaction-status ${rx.ready ? 'status-ready' : 'status-processing'}">
        ${rx.ready ? window.__('dashboard.status.ready') : window.__('dashboard.status.proc')}
      </div>
    </div>
    ${url ? `<button class="reaction-dl" id="rxdl-${rx.id}">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M5.5 1v6M3 5l2.5 2.5L8 5"/><path d="M1 9.5h9"/>
      </svg>
      <span>${window.__('download')}</span>
    </button>` : ''}
  </div>`;
}

// Re-render on language change
document.addEventListener('rc-langchange', () => {
  if (_dashData) {
    renderPlanBar(_dashData);
    renderDashboard(_dashData.videos);
  }
  if (_myReactions) renderMyReactions(_myReactions);
  document.getElementById('modalClose').textContent = window.__('dashboard.modal.close');
});

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(url) {
  const modal = document.getElementById('modal');
  const video = document.getElementById('modalVideo');
  video.src = url; video.play();
  modal.classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalVideo').pause();
  document.getElementById('modalVideo').src = '';
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modalVideo').pause();
    document.getElementById('modalVideo').src = '';
  }
});

init();
</script>
</body>
</html>
